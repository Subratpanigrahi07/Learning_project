<!-- Login Screen Component -->
<!-- Include this in your main index.html as a template or separate view -->

<div id="login-view" class="fixed inset-0 z-50 hidden flex items-center justify-center px-4 py-10 animate-fade-in bg-slate-900/60 backdrop-blur-md">
  <div class="glass-card w-full max-w-md rounded-3xl p-6 md:p-8 border border-slate-800/80 relative overflow-hidden">
    <div class="absolute -right-10 -top-10 h-32 w-32 rounded-full bg-gradient-to-tr from-indigo-500 via-purple-500 to-emerald-400 opacity-60 blur-3xl"></div>
    
    <div class="relative">
      <!-- Logo/Title -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-violet-500 to-indigo-600 mb-4 shadow-lg shadow-indigo-500/50">
          <i class="fa-solid fa-chart-line text-2xl text-white"></i>
        </div>
        <h1 class="text-3xl font-bold text-slate-100 mb-1">Performance Tracker</h1>
        <p class="text-sm text-slate-400">Adaptive Learning System</p>
      </div>

      <!-- Form -->
      <form id="login-form" class="space-y-4 mb-6">
        <!-- Username -->
        <div>
          <label class="block text-xs font-semibold text-slate-300 mb-2">Username</label>
          <input
            id="username"
            type="text"
            placeholder="Enter your username"
            class="w-full px-4 py-2.5 rounded-lg bg-slate-800/80 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition"
            autocomplete="off"
          />
          <p class="text-xs text-slate-500 mt-1">Try: admin, faculty1, or 24CSEAIML063</p>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-xs font-semibold text-slate-300 mb-2">Password</label>
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            class="w-full px-4 py-2.5 rounded-lg bg-slate-800/80 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20 transition"
            autocomplete="off"
          />
          <p class="text-xs text-slate-500 mt-1">Demo password: password</p>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full py-2.5 rounded-lg bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold hover:shadow-lg hover:shadow-indigo-500/50 transition flex items-center justify-center gap-2 group"
        >
          <span id="login-spinner" class="hidden h-4 w-4 rounded-full border-2 border-white border-t-transparent animate-spin-soft"></span>
          <span>Sign In</span>
          <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition"></i>
        </button>
      </form>

      <!-- Demo Info -->
      <div class="rounded-lg bg-slate-900/60 border border-slate-800 px-4 py-3 text-xs text-slate-400 space-y-2">
        <p class="font-semibold text-slate-300">📌 Demo Accounts:</p>
        <ul class="space-y-1 ml-2">
          <li>👤 <strong>admin</strong> / password (Admin)</li>
          <li>👨‍🏫 <strong>faculty1</strong> / password (Faculty)</li>
          <li>👨‍🎓 <strong>24CSEAIML063</strong> / password (Student)</li>
        </ul>
      </div>
    </div>
  </div>
</div>
