<!-- Student Dashboard View -->
<!-- Main dashboard for students showing overview and statistics -->

<div id="student-dashboard" data-view class="hidden flex-1 flex flex-col min-w-0 animate-fade-in">
  <!-- Breadcrumb Navigation -->
  <div id="breadcrumb" class="px-6 py-3 border-b border-slate-800/50 flex items-center gap-2 text-xs text-slate-400">
    <span id="breadcrumb-text">Dashboard</span>
  </div>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto scrollbar-thin p-6">
    <div class="max-w-7xl mx-auto space-y-6">
      <!-- Header -->
      <div class="flex items-center justify-between flex-wrap gap-4">
        <div>
          <h1 class="text-3xl font-bold text-slate-100">Welcome back, <span id="student-welcome-name">Student</span>! 👋</h1>
          <p class="text-sm text-slate-400 mt-1">Track your academic performance and progress</p>
        </div>
        <button
          id="btn-analyze-performance"
          class="px-4 py-2 rounded-lg bg-gradient-to-r from-violet-500 to-indigo-600 text-white text-sm font-semibold hover:shadow-lg hover:shadow-indigo-500/50 transition flex items-center gap-2"
        >
          <i class="fa-solid fa-sparkles"></i>Analyze with AI
        </button>
      </div>

      <!-- Quick Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <!-- Attendance Card -->
        <div class="glass-card rounded-xl p-5 border border-slate-800/60 hover:border-emerald-500/30 transition">
          <div class="flex items-center justify-between mb-3">
            <p class="text-xs font-semibold text-slate-400 uppercase">Attendance</p>
            <i class="fa-solid fa-calendar-check text-emerald-400 text-lg"></i>
          </div>
          <p id="student-agg-attendance" class="text-3xl font-bold text-emerald-300">0%</p>
          <div class="mt-3 h-2 rounded-full bg-slate-700 overflow-hidden">
            <div id="student-agg-attendance-bar" class="h-full bg-gradient-to-r from-emerald-500 to-green-400 rounded-full" style="width: 0%"></div>
          </div>
        </div>

        <!-- Average Marks Card -->
        <div class="glass-card rounded-xl p-5 border border-slate-800/60 hover:border-sky-500/30 transition">
          <div class="flex items-center justify-between mb-3">
            <p class="text-xs font-semibold text-slate-400 uppercase">Avg Marks</p>
            <i class="fa-solid fa-star text-sky-400 text-lg"></i>
          </div>
          <p id="student-avg-marks" class="text-3xl font-bold text-sky-300">0</p>
          <div class="mt-3 h-2 rounded-full bg-slate-700 overflow-hidden">
            <div id="student-avg-marks-bar" class="h-full bg-gradient-to-r from-sky-500 to-blue-400 rounded-full" style="width: 0%"></div>
          </div>
        </div>

        <!-- Status Card -->
        <div id="student-overall-category" class="glass-card rounded-xl p-5 border border-slate-800/60 hover:border-amber-500/30 transition">
          <p class="text-xs font-semibold text-slate-400 uppercase mb-3">Status</p>
          <p class="text-2xl font-bold text-amber-300">Average</p>
        </div>

        <!-- Subjects Card -->
        <div class="glass-card rounded-xl p-5 border border-slate-800/60 hover:border-violet-500/30 transition">
          <div class="flex items-center justify-between mb-3">
            <p class="text-xs font-semibold text-slate-400 uppercase">Subjects</p>
            <i class="fa-solid fa-book text-violet-400 text-lg"></i>
          </div>
          <p id="student-subject-count" class="text-3xl font-bold text-violet-300">0</p>
          <p class="text-xs text-slate-400 mt-2">Tracked courses</p>
        </div>
      </div>

      <!-- Subject-wise Performance -->
      <div class="glass-card rounded-xl p-6 border border-slate-800/60">
        <div class="flex items-center justify-between mb-4 pb-4 border-b border-slate-800/50">
          <h2 class="text-lg font-bold text-slate-100">Subject Performance</h2>
          <input
            id="student-subject-search"
            type="text"
            placeholder="Search subjects..."
            class="px-3 py-2 rounded-lg bg-slate-800/80 border border-slate-700 text-xs text-slate-100 placeholder-slate-500 focus:outline-none focus:border-indigo-500 w-48"
          />
        </div>
        <div id="student-subject-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          <!-- Populated by JavaScript -->
        </div>
      </div>

      <!-- Additional Sections -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Profile Preview -->
        <div class="glass-card rounded-xl p-6 border border-slate-800/60">
          <div class="flex items-center gap-3 mb-4 pb-4 border-b border-slate-800/50">
            <div class="h-10 w-10 rounded-full bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center">
              <i class="fa-solid fa-user text-white"></i>
            </div>
            <div>
              <p class="font-semibold text-slate-100 text-sm">My Profile</p>
              <p id="student-profile-preview" class="text-xs text-slate-400">Student</p>
            </div>
          </div>
          <button
            data-nav-card
            class="w-full py-2 rounded-lg bg-slate-900/60 hover:bg-slate-800 text-slate-300 hover:text-slate-100 text-xs font-medium transition"
            onclick="switchView('student-profile')"
          >
            View Full Profile →
          </button>
        </div>

        <!-- Quick Actions -->
        <div class="glass-card rounded-xl p-6 border border-slate-800/60">
          <p class="font-semibold text-slate-100 text-sm mb-4 pb-4 border-b border-slate-800/50">Quick Actions</p>
          <div class="space-y-2">
            <button id="btn-view-trends" data-nav-card class="w-full py-2 rounded-lg bg-slate-900/60 hover:bg-slate-800 text-slate-300 hover:text-slate-100 text-xs font-medium transition">
              📈 View Trends
            </button>
            <button id="btn-view-leaderboard" data-nav-card class="w-full py-2 rounded-lg bg-slate-900/60 hover:bg-slate-800 text-slate-300 hover:text-slate-100 text-xs font-medium transition">
              🏆 Leaderboard
            </button>
            <button id="btn-export-report" class="w-full py-2 rounded-lg bg-slate-900/60 hover:bg-slate-800 text-slate-300 hover:text-slate-100 text-xs font-medium transition">
              📥 Export Report
            </button>
          </div>
        </div>

        <!-- Notifications Preview -->
        <div class="glass-card rounded-xl p-6 border border-slate-800/60">
          <p class="font-semibold text-slate-100 text-sm mb-4 pb-4 border-b border-slate-800/50 flex items-center gap-2">
            <i class="fa-solid fa-bell text-amber-400"></i>Latest Updates
          </p>
          <div id="student-notifications-preview" class="space-y-2 text-xs">
            <!-- Populated by JavaScript -->
          </div>
        </div>
      </div>

      <!-- AI Study Companion Section -->
      <div class="glass-card rounded-xl p-6 border border-violet-500/30 bg-gradient-to-br from-violet-950/30 to-slate-900/30">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="h-10 w-10 rounded-lg bg-gradient-to-br from-violet-500 to-indigo-600 flex items-center justify-center">
              <i class="fa-solid fa-robot text-white"></i>
            </div>
            <div>
              <p class="font-semibold text-slate-100">AI Study Companion</p>
              <p class="text-xs text-slate-400">Get personalized insights and recommendations</p>
            </div>
          </div>
          <button
            id="ai-chat-toggle"
            class="px-4 py-2 rounded-lg bg-violet-600 hover:bg-violet-700 text-white text-xs font-medium transition"
          >
            Start Chat
          </button>
        </div>
      </div>
    </div>
  </main>
</div>
